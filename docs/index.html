<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flatload — Flat-file CMS</title>
  
  
  <meta property="og:title" content="Flatload — Flat-file CMS" />
  <meta property="og:type" content="website" />
  
  
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Flatload — Flat-file CMS" />
  
  <link rel="stylesheet" href="./app.css" />
  <script>(function(){try{var t=localStorage.getItem('theme')||'system';var d=window.matchMedia('(prefers-color-scheme:dark)').matches;var dark=(t==='dark')||(t==='system'&&d);document.documentElement.setAttribute('data-theme',dark?'dark':'light');var di=document.querySelector('.dark-icon');var li=document.querySelector('.light-icon');if(dark){if(di)di.classList.remove('hidden');if(li)li.classList.add('hidden');}else{if(di)di.classList.add('hidden');if(li)li.classList.remove('hidden');}}catch(e){}})();</script>
</head>
<body class="bg-background text-foreground min-h-screen flex flex-col">
  
  
<header class="sticky top-0 z-40 w-full border-b border-border bg-background/95 backdrop-blur">
  <div class="container flex h-16 items-center justify-between">
    <a href="/flatload/" class="font-semibold text-lg">Zero-Hop</a>
    <nav class="flex items-center gap-6">
      <a href="/flatload/posts" class="text-sm font-medium hover:text-primary transition-colors">Posts</a><a href="/flatload/contact" class="text-sm font-medium hover:text-primary transition-colors">Contact</a>
      <a href="/flatload/search" aria-label="Search" class="hover:text-primary transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </a>
      <button id="theme-toggle" aria-label="Toggle theme" class="hover:text-primary transition-colors">
        <svg class="dark-icon hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg>
        <svg class="light-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </nav>
  </div>
</header>
  <main class="flex-1">
    
<section class="relative min-h-[80vh] flex items-end bg-foreground text-background overflow-hidden">
  <div class="absolute inset-0 opacity-60"><img src="./media/image-hero1.webp" srcset="./media/image-hero1.webp 300w, ./media/image-hero1.webp 600w, ./media/image-hero1.webp 900w, ./media/image-hero1.webp 1400w" sizes="(max-width:640px) 100vw, (max-width:1024px) 75vw, 50vw" alt="Straight metallic shapes with a blue gradient" class="absolute inset-0 w-full h-full object-cover" loading="eager" /></div>
  <div class="relative container py-16 md:py-24">
    <div class="max-w-3xl prose prose-invert">
      <h1>Flatload</h1><p>A flat-file CMS — edit YAML, push to git, deploy to GitHub Pages.</p>
    </div>
    <div class="flex flex-wrap gap-4 mt-8"><a href="/flatload/posts" class="bg-white text-foreground px-6 py-3 rounded hover:opacity-90 transition-opacity">All posts</a><a href="/flatload/contact" class="border border-white text-white px-6 py-3 rounded hover:bg-white hover:text-foreground transition-colors">Contact</a></div>
  </div>
</section>
  </main>
  
<footer class="border-t border-border mt-auto">
  <div class="container py-8 flex flex-col md:flex-row items-center justify-between gap-4">
    <p class="text-sm text-muted-foreground">&copy; 2026 Zero-Hop</p>
    <nav class="flex flex-wrap gap-6"><a href="/flatload/admin" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Admin</a><a href="https://github.com/AnEntrypoint/flatload" class="text-sm text-muted-foreground hover:text-foreground transition-colors">Source Code</a></nav>
  </div>
</footer>
  <script type="module" src="./client.js"></script>
</body>
</html>
